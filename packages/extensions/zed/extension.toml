id = "openmods"
name = "OpenMods"
description = "AI-powered Minecraft Mod Development CLI"
version = "0.1.0"
schema_version = 1
authors = ["OpenMods Team"]
repository = "https://github.com/openmods-ai/openmods"

[agent_servers.openmods]
name = "OpenMods"
icon = "./icons/opencode.svg"

[agent_servers.openmods.targets.darwin-aarch64]
archive = "https://github.com/openmods-ai/openmods/releases/download/v0.1.0/openmods-darwin-arm64.zip"
cmd = "./openmods"
args = ["acp"]

[agent_servers.openmods.targets.darwin-x86_64]
archive = "https://github.com/openmods-ai/openmods/releases/download/v0.1.0/openmods-darwin-x64.zip"
cmd = "./openmods"
args = ["acp"]

[agent_servers.openmods.targets.linux-aarch64]
archive = "https://github.com/openmods-ai/openmods/releases/download/v0.1.0/openmods-linux-arm64.tar.gz"
cmd = "./openmods"
args = ["acp"]

[agent_servers.openmods.targets.linux-x86_64]
archive = "https://github.com/openmods-ai/openmods/releases/download/v0.1.0/openmods-linux-x64.tar.gz"
cmd = "./openmods"
args = ["acp"]

[agent_servers.openmods.targets.windows-x86_64]
archive = "https://github.com/openmods-ai/openmods/releases/download/v0.1.0/openmods-windows-x64.zip"
cmd = "./openmods.exe"
args = ["acp"]

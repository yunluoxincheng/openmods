name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write
  id-token: write

jobs:
  build-and-publish:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - uses: ./.github/actions/setup-bun

      - name: Build all binaries
        working-directory: packages/opencode
        run: bun run script/build.ts
        env:
          GH_REPO: ${{ github.repository }}
          OPENMODS_RELEASE: "true"

      - name: Get version
        id: version
        working-directory: packages/opencode
        run: echo "version=$(node -p "require('./package.json').version")" >> $GITHUB_OUTPUT
        shell: bash

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.version }}
          name: OpenMods v${{ steps.version.outputs.version }}
          files: |
            packages/opencode/dist/*.zip
            packages/opencode/dist/*.tar.gz
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js for npm
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          registry-url: "https://registry.npmjs.org"

      - name: Publish platform packages to npm
        working-directory: packages/opencode
        run: |
          for dir in dist/openmods-ai-*/; do
            if [ -f "${dir}package.json" ]; then
              name=$(basename "$dir")
              echo "Publishing $name..."
              npm publish "$dir" --access public --tag latest
            fi
          done
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Create and publish main package
        working-directory: packages/opencode
        run: |
          # Get all platform package names and versions
          binaries="{"
          first=true
          for dir in dist/openmods-ai-*/; do
            if [ -f "${dir}package.json" ]; then
              pkg_name=$(node -p "require('./${dir}package.json').name")
              pkg_version=$(node -p "require('./${dir}package.json').version")
              if [ "$first" = true ]; then
                first=false
              else
                binaries+=","
              fi
              binaries+="\"$pkg_name\":\"$pkg_version\""
            fi
          done
          binaries+="}"

          # Create main package directory
          mkdir -p dist/openmods-ai/bin
          cp bin/openmods dist/openmods-ai/bin/
          cp script/postinstall.mjs dist/openmods-ai/

          # Create package.json
          version="${{ steps.version.outputs.version }}"
          cat > dist/openmods-ai/package.json << EOF
          {
            "name": "openmods-ai",
            "version": "$version",
            "license": "MIT",
            "bin": {
              "openmods": "./bin/openmods"
            },
            "scripts": {
              "postinstall": "node ./postinstall.mjs"
            },
            "optionalDependencies": $binaries
          }
          EOF

          echo "Publishing openmods-ai..."
          npm publish dist/openmods-ai --access public --tag latest
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

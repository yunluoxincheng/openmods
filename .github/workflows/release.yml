name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write
  id-token: write

jobs:
  build-and-publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - uses: ./.github/actions/setup-bun

      - name: Build all binaries
        working-directory: packages/core
        run: bun run script/build.ts
        env:
          GH_REPO: ${{ github.repository }}
          GH_TOKEN: ${{ github.token }}
          OPENMODS_RELEASE: "true"
          SKIP_RELEASE_UPLOAD: "true"

      - name: Get version
        id: version
        working-directory: packages/core
        run: echo "version=$(node -p "require('./package.json').version")" >> $GITHUB_OUTPUT
        shell: bash

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.version }}
          name: OpenMods v${{ steps.version.outputs.version }}
          files: |
            packages/core/dist/*.zip
            packages/core/dist/*.tar.gz
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js for npm
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          registry-url: "https://registry.npmjs.org"

      - name: Publish all platform packages
        working-directory: packages/core/dist
        run: |
          for dir in openmods-ai-*/; do
            if [ -f "${dir}package.json" ]; then
              name=$(basename "$dir")
              version=$(cat "${dir}package.json" | grep '"version"' | head -1 | sed 's/.*: *"\([^"]*\)".*/\1/')
              
              # Check if already published
              if npm view "$name@$version" version 2>/dev/null; then
                echo "=== Skipping $name@$version (already published) ==="
                continue
              fi
              
              echo "=== Publishing $name@$version ==="
              cd "$dir"
              npm publish --access public --tag latest
              cd -
            fi
          done
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Create and publish main package
        working-directory: packages/core/dist
        run: |
          # Get all platform package names and versions
          binaries="{"
          first=true
          for dir in openmods-ai-*/; do
            if [ -f "${dir}package.json" ]; then
              pkg_name=$(cat "${dir}package.json" | node -e "console.log(JSON.parse(require('fs').readFileSync(0)).name)")
              pkg_version=$(cat "${dir}package.json" | node -e "console.log(JSON.parse(require('fs').readFileSync(0)).version)")
              if [ "$first" = true ]; then
                first=false
              else
                binaries+=","
              fi
              binaries+="\"$pkg_name\":\"$pkg_version\""
            fi
          done
          binaries+="}"

          # Create main package directory
          mkdir -p openmods-ai/bin
          if [ -f "openmods-ai-linux-x64/bin/openmods" ]; then
            cp openmods-ai-linux-x64/bin/openmods openmods-ai/bin/
          fi

          # Create postinstall script
          cat > openmods-ai/postinstall.mjs << 'POSTINSTALL'
          #!/usr/bin/env node
          import { spawnSync } from "child_process"
          import { fileURLToPath } from "url"
          import { dirname, join } from "path"
          import { platform } from "os"
          import { existsSync } from "fs"

          const __dirname = dirname(fileURLToPath(import.meta.url))
          const isWindows = platform() === "win32"
          const binaryName = isWindows ? "openmods.exe" : "openmods"

          function getPackageName() {
            const p = platform()
            const a = process.arch
            if (p === "darwin") return "openmods-ai-darwin-" + a
            if (p === "linux") return "openmods-ai-linux-" + a
            if (p === "win32") return "openmods-ai-windows-" + a
            return null
          }

          const pkgName = getPackageName()
          if (!pkgName) {
            console.log("Unsupported platform")
            process.exit(0)
          }

          try {
            const binaryPath = join(__dirname, "..", pkgName, "bin", binaryName)
            if (existsSync(binaryPath)) {
              console.log("Binary found:", binaryPath)
            }
          } catch (e) {
            console.log("Postinstall skipped:", e.message)
          }
          POSTINSTALL

          # Create package.json
          cat > openmods-ai/package.json << EOF
          {
            "name": "openmods-ai",
            "version": "0.1.0",
            "license": "MIT",
            "files": ["bin", "postinstall.mjs"],
            "bin": {
              "openmods": "./bin/openmods"
            },
            "scripts": {
              "postinstall": "node ./postinstall.mjs"
            },
            "optionalDependencies": $binaries
          }
          EOF

          echo "=== Publishing openmods-ai ==="
          npm publish openmods-ai --access public --tag latest
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

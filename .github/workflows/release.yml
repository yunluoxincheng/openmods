name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - uses: ./.github/actions/setup-bun

      - name: Build all binaries
        working-directory: packages/opencode
        run: bun run script/build.ts
        env:
          GH_REPO: ${{ github.repository }}
          GH_TOKEN: ${{ github.token }}
          OPENMODS_RELEASE: "true"
          SKIP_RELEASE_UPLOAD: "true"

      - name: Get version
        id: version
        working-directory: packages/opencode
        run: echo "version=$(node -p "require('./package.json').version")" >> $GITHUB_OUTPUT
        shell: bash

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.version }}
          name: OpenMods v${{ steps.version.outputs.version }}
          files: |
            packages/opencode/dist/*.zip
            packages/opencode/dist/*.tar.gz
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload dist as artifact
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: packages/opencode/dist/

  publish:
    needs: build
    runs-on: ubuntu-latest
    strategy:
      matrix:
        package:
          - openmods-ai-linux-arm64
          - openmods-ai-linux-x64
          - openmods-ai-darwin-arm64
          - openmods-ai-darwin-x64
          - openmods-ai-windows-arm64
          - openmods-ai-windows-x64
    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist

      - name: Setup Node.js for npm
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          registry-url: "https://registry.npmjs.org"

      - name: Publish platform package
        run: |
          if [ -d "dist/${{ matrix.package }}" ]; then
            echo "Publishing ${{ matrix.package }}..."
            npm publish "dist/${{ matrix.package }}" --access public --tag latest
          fi
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  publish-main:
    needs: publish
    runs-on: ubuntu-latest
    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist

      - name: Setup Node.js for npm
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          registry-url: "https://registry.npmjs.org"

      - name: Create and publish main package
        run: |
          # Get all platform package names and versions
          binaries="{"
          first=true
          for dir in dist/openmods-ai-*/; do
            if [ -f "${dir}package.json" ]; then
              pkg_name=$(node -p "require('./${dir}package.json').name")
              pkg_version=$(node -p "require('./${dir}package.json').version")
              if [ "$first" = true ]; then
                first=false
              else
                binaries+=","
              fi
              binaries+="\"$pkg_name\":\"$pkg_version\""
            fi
          done
          binaries+="}"

          # Create main package directory
          mkdir -p dist/openmods-ai/bin
          cp dist/openmods-ai-linux-x64/bin/openmods dist/openmods-ai/bin/ 2>/dev/null || true

          # Create postinstall script
          cat > dist/openmods-ai/postinstall.mjs << 'EOF'
          #!/usr/bin/env node
          import { spawnSync } from "child_process"
          import { fileURLToPath } from "url"
          import { dirname, join } from "path"
          import { platform } from "os"
          import { existsSync } from "fs"

          const __dirname = dirname(fileURLToPath(import.meta.url))
          const isWindows = platform() === "win32"
          const binaryName = isWindows ? "openmods.exe" : "openmods"

          function getPackageName() {
            const p = platform()
            const a = process.arch
            if (p === "darwin") return `openmods-ai-darwin-${a}`
            if (p === "linux") return `openmods-ai-linux-${a}`
            if (p === "win32") return `openmods-ai-windows-${a}`
            return null
          }

          const pkgName = getPackageName()
          if (!pkgName) {
            console.log("Unsupported platform")
            process.exit(0)
          }

          try {
            const binaryPath = join(__dirname, "..", pkgName, "bin", binaryName)
            if (existsSync(binaryPath)) {
              console.log("Binary found:", binaryPath)
            }
          } catch (e) {
            console.log("Postinstall skipped:", e.message)
          }
          EOF

          # Create package.json
          cat > dist/openmods-ai/package.json << EOF
          {
            "name": "openmods-ai",
            "version": "0.1.0",
            "license": "MIT",
            "files": ["bin", "postinstall.mjs"],
            "bin": {
              "openmods": "./bin/openmods"
            },
            "scripts": {
              "postinstall": "node ./postinstall.mjs"
            },
            "optionalDependencies": $binaries
          }
          EOF

          echo "Publishing openmods-ai..."
          npm publish dist/openmods-ai --access public --tag latest
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
